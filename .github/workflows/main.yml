name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Download Gradle wrapper jar
        run: curl -sL "https://services.gradle.org/distributions/gradle-8.8-bin.zip" -o gradle-bin.zip && unzip -j gradle-bin.zip "gradle-8.8/lib/plugins/gradle-wrapper-*.jar" -d gradle/wrapper/ && mv gradle/wrapper/gradle-wrapper-*.jar gradle/wrapper/gradle-wrapper.jar
      - run: chmod +x gradlew
      - run: ./gradlew build
      - uses: actions/upload-artifact@v4
        with:
          name: playeresp-jar
          path: build/libs/*[^sources].jar
